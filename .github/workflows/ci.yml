name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches-ignore: ["main"]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install project dependencies 
        run: uv sync

      - name: Run lint check
        run: uv run ruff check .

      - name: Run format check
        run: uv run ruff format --check .

      - name: Run unit tests
        run: uv run pytest
